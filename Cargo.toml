[workspace]
members = [
  "services/api",
  "services/worker-judge",
  "services/worker-proctor",
  "services/worker-media",
  "services/worker-analytics",
]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.78"
license = "Apache-2.0"

[workspace.dependencies]
axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1.37", features = ["rt-multi-thread", "macros", "signal"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
